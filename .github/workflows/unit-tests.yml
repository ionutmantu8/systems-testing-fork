name: Unit Tests

on:
  pull_request: :
    branches:
      - main

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run unit tests
        run: python -m pytest -v laboratories/cicd-documentation/test_tree.py
